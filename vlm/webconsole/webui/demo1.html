<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StrikeRobot · Demo 1</title>
<style>
  :root {
    --ink:#0f1115; --line:#e8eaee; --muted:#6b7280; --accent:#0f1115;
    --ok:#16a34a; --run:#2563eb; --err:#dc2626; --bg:#eef1f5; --card:#ffffff;
  }
  * { box-sizing:border-box; }
  html,body { margin:0; height:100%; }
  body {
    font-family:"Inter","Segoe UI",system-ui,sans-serif; color:var(--ink);
    background:
      radial-gradient(1100px 600px at 100% -10%, #e3e9f5 0%, transparent 60%),
      radial-gradient(900px 500px at -10% 110%, #e9e4f3 0%, transparent 55%),
      var(--bg);
    overflow:hidden;
  }
  header {
    display:flex; align-items:center; gap:14px; padding:14px 24px;
    background:rgba(255,255,255,.85); backdrop-filter:blur(8px);
    border-bottom:1px solid var(--line);
  }
  header img { width:42px; height:42px; border-radius:11px; object-fit:cover;
               box-shadow:0 2px 8px rgba(0,0,0,.12); }
  header .brand { display:flex; flex-direction:column; line-height:1.15; }
  header .t { font-weight:800; letter-spacing:1.5px; font-size:18px; }
  header .s { color:var(--muted); font-size:12px; letter-spacing:.3px; }
  .badge { margin-left:auto; font-size:12px; padding:7px 13px; border-radius:999px;
           display:flex; align-items:center; gap:8px; border:1px solid var(--line);
           background:#fff; font-weight:600; letter-spacing:.4px; }
  .dot { width:9px; height:9px; border-radius:50%; background:#cbd5e1; transition:.3s; }
  .badge.on  { color:#0f7a3d; border-color:#bbf7d0; background:#f0fdf4; }
  .badge.on .dot  { background:var(--ok); box-shadow:0 0 0 4px rgba(22,163,74,.15); }
  .badge.off { color:#9b1c1c; border-color:#fecaca; background:#fef2f2; }
  .badge.off .dot { background:var(--err); box-shadow:0 0 0 4px rgba(220,38,38,.12); }

  .app { display:grid; grid-template-columns:1.15fr 1fr; gap:20px; padding:20px;
         height:calc(100vh - 71px); }
  .card { background:var(--card); border:1px solid var(--line); border-radius:20px;
          box-shadow:0 6px 24px rgba(15,17,21,.06); display:flex; flex-direction:column;
          overflow:hidden; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px;
             color:var(--muted); margin:0; padding:16px 20px; border-bottom:1px solid var(--line);
             display:flex; align-items:center; gap:8px; }
  .card h2 .live { width:7px; height:7px; border-radius:50%; background:var(--err);
                   animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

  .video { flex:1; display:flex; align-items:center; justify-content:center; padding:18px;
           background:#0f1115; }
  .video img { max-width:100%; max-height:100%; border-radius:12px; }

  .chat { flex:1; overflow-y:auto; padding:18px 20px; display:flex;
          flex-direction:column; gap:12px; scroll-behavior:smooth; }
  .empty { margin:auto; color:#9aa1ac; font-size:14px; text-align:center; max-width:280px; }

  /* user command bubble */
  .bubble { align-self:flex-end; max-width:80%; background:var(--ink); color:#fff;
            padding:11px 16px; border-radius:16px 16px 4px 16px; font-size:14px;
            box-shadow:0 4px 14px rgba(15,17,21,.18); animation:rise .25s ease; }
  .bubble .who { font-size:10px; text-transform:uppercase; letter-spacing:.8px;
                 opacity:.6; margin-bottom:3px; }

  .step { display:flex; gap:13px; padding:12px 0; border-bottom:1px dashed var(--line);
          animation:rise .3s ease; }
  .step:last-child { border-bottom:0; }
  @keyframes rise { from{opacity:0; transform:translateY(8px)} }
  .ico { width:34px; height:34px; flex:none; border-radius:10px; display:flex;
         align-items:center; justify-content:center; font-size:16px; background:#f1f3f7;
         border:1px solid var(--line); transition:.3s; }
  .step.running .ico { background:#e6efff; border-color:#bfdbfe; animation:glow 1.4s infinite; }
  .step.done .ico    { background:#e9fbf0; border-color:#bbf7d0; }
  .step.error .ico   { background:#fdeaea; border-color:#fecaca; }
  @keyframes glow { 0%,100%{box-shadow:0 0 0 0 rgba(37,99,235,.25)} 50%{box-shadow:0 0 0 5px rgba(37,99,235,0)} }
  .step .body { flex:1; min-width:0; }
  .step .title { font-weight:650; font-size:14px; display:flex; align-items:center; gap:8px; }
  .step.running .title::after { content:""; width:6px; height:6px; border-radius:50%;
         background:var(--run); animation:pulse 1s infinite; }
  .step .detail { color:var(--muted); font-size:13px; margin-top:4px; white-space:pre-wrap;
                  line-height:1.5; word-break:break-word; }
  .step .detail img { display:block; margin-top:10px; max-width:100%; border-radius:10px;
                      border:1px solid var(--line); }
  .mono { font-family:ui-monospace,"SF Mono",Menlo,monospace; font-size:12px;
          color:#475569; background:#f1f3f7; padding:1px 6px; border-radius:6px; }

  .answer { margin:14px 20px 18px; padding:18px; border-radius:16px;
            border:1px solid var(--line); background:linear-gradient(180deg,#fafbfc,#f4f6f9);
            display:none; animation:rise .35s ease; }
  .answer.show { display:block; }
  .answer .lab { font-size:11px; color:var(--muted); text-transform:uppercase;
                 letter-spacing:1px; }
  .answer .row { display:flex; align-items:center; gap:12px; margin-top:8px; }
  .answer .state { padding:5px 14px; border-radius:999px; font-size:13px; font-weight:800;
                   letter-spacing:.5px; flex:none; }
  .answer .state.ON, .answer .state.YES { background:#dcfce7; color:#15803d; }
  .answer .state.OFF, .answer .state.NO { background:#fee2e2; color:#991b1b; }
  .answer .state.UNKNOWN { background:#fef3c7; color:#92400e; }
  .answer .txt { font-size:15px; font-weight:600; line-height:1.5; }

  .composer { display:flex; gap:10px; padding:16px 18px; border-top:1px solid var(--line);
              background:#fff; }
  .composer input { flex:1; border:1px solid var(--line); border-radius:12px;
                    padding:13px 16px; font-size:14px; outline:none; transition:.2s; }
  .composer input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(15,17,21,.08); }
  .composer button { background:var(--accent); color:#fff; border:0; border-radius:12px;
                     padding:0 24px; font-weight:700; cursor:pointer; transition:.15s; }
  .composer button:hover:not(:disabled) { transform:translateY(-1px); }
  .composer button:disabled { opacity:.45; cursor:not-allowed; }
</style>
</head>
<body>
<header>
  <img src="/assets/logo.jpg" alt="StrikeRobot" onerror="this.style.display='none'">
  <div class="brand">
    <span class="t">STRIKE ROBOT</span>
    <span class="s">Demo 1 · Agentic Navigation + Vision</span>
  </div>
  <span id="badge" class="badge off"><span class="dot"></span><span id="btxt">…</span></span>
</header>

<div class="app">
  <section class="card">
    <h2><span class="live"></span> Live Camera</h2>
    <div class="video"><img id="feed" src="/video_feed" alt="camera"></div>
  </section>

  <section class="card">
    <h2>Reasoning</h2>
    <div id="chat" class="chat">
      <div class="empty">Type a command to begin — e.g. <b>“Is the food done heating yet?”</b></div>
    </div>
    <div id="answer" class="answer">
      <div class="lab">Conclusion</div>
      <div class="row">
        <span id="answer-state" class="state"></span>
        <div id="answer-txt" class="txt"></div>
      </div>
    </div>
    <form id="composer" class="composer">
      <input id="cmd" placeholder='e.g. "Is the food done heating yet?"' autocomplete="off">
      <button id="send" type="submit">Send</button>
    </form>
  </section>
</div>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('composer');
const cmd = document.getElementById('cmd');
const sendBtn = document.getElementById('send');
const badge = document.getElementById('badge');
const btxt = document.getElementById('btxt');
const answerBox = document.getElementById('answer');
const answerTxt = document.getElementById('answer-txt');
const answerState = document.getElementById('answer-state');

const ICONS  = { plan:'🧠', nav:'🧭', perceive:'👁️' };
const TITLES = { plan:'Planning', nav:'Navigating', perceive:'Observing' };
const steps = {};

async function pollStatus() {
  try {
    const s = await (await fetch('/status')).json();
    badge.className = 'badge ' + (s.connected ? 'on' : 'off');
    btxt.textContent = s.connected ? 'CONNECTED' : (s.mock ? 'MOCK MODE' : 'DISCONNECTED');
  } catch(e){ badge.className='badge off'; btxt.textContent='OFFLINE'; }
}
pollStatus(); setInterval(pollStatus, 3000);

function clearEmpty(){ const e=chat.querySelector('.empty'); if(e) e.remove(); }
function ensureStep(id){
  if(steps[id]) return steps[id];
  clearEmpty();
  const el=document.createElement('div'); el.className='step running';
  el.innerHTML=`<div class="ico">${ICONS[id]||'•'}</div><div class="body">
    <div class="title"></div><div class="detail"></div></div>`;
  el.querySelector('.title').textContent = TITLES[id] || id;
  chat.appendChild(el); chat.scrollTop=chat.scrollHeight;
  steps[id]={el, detail:el.querySelector('.detail'), title:el.querySelector('.title')};
  return steps[id];
}
function reset(){
  chat.innerHTML=''; for(const k in steps) delete steps[k];
  answerBox.classList.remove('show');
}
function addUserBubble(text){
  clearEmpty();
  const b=document.createElement('div'); b.className='bubble';
  const who=document.createElement('div'); who.className='who'; who.textContent='You';
  const t=document.createElement('div'); t.textContent=text;
  b.appendChild(who); b.appendChild(t);
  chat.appendChild(b); chat.scrollTop=chat.scrollHeight;
}

let ws, busy=false;
function connectWS(){
  ws=new WebSocket(`ws://${location.host}/ws`);
  ws.onclose=()=>setTimeout(connectWS,1500);
  ws.onmessage=onMsg;
}
connectWS();

function onMsg(ev){
  const m=JSON.parse(ev.data);
  if(m.type==='step'){
    const s=ensureStep(m.id);
    s.el.className='step '+m.status;
    if(m.title) s.title.textContent=m.title;
    if(m.data && m.data.x!==undefined)
      s.detail.innerHTML=`Target <span class="mono">${m.data.room}</span> → <span class="mono">x=${m.data.x}, y=${m.data.y}</span>`;
  } else if(m.type==='token'){
    const s=ensureStep(m.step); s.detail.textContent+=m.text;
    chat.scrollTop=chat.scrollHeight;
  } else if(m.type==='nav'){
    const s=ensureStep('nav');
    s.detail.innerHTML=`<span class="mono">${m.distance_remaining.toFixed(2)} m</span> remaining…`;
  } else if(m.type==='image'){
    const s=ensureStep('perceive'); const img=new Image();
    img.src='data:image/jpeg;base64,'+m.data; s.detail.appendChild(img);
    chat.scrollTop=chat.scrollHeight;
  } else if(m.type==='answer'){
    answerTxt.textContent=m.text;
    const showChip = m.state && m.state!=='UNKNOWN';
    answerState.textContent=m.state; answerState.className='state '+m.state;
    answerState.style.display = showChip ? '' : 'none';
    answerBox.classList.add('show'); finish();
  } else if(m.type==='error'){
    finish(); clearEmpty();
    const e=document.createElement('div'); e.className='step error';
    e.innerHTML=`<div class="ico">⚠️</div><div class="body"><div class="title">Error</div>
      <div class="detail"></div></div>`;
    e.querySelector('.detail').textContent=m.message;
    chat.appendChild(e); chat.scrollTop=chat.scrollHeight;
  }
}

form.addEventListener('submit',(e)=>{
  e.preventDefault();
  const c=cmd.value.trim();
  if(!c||busy||ws.readyState!==1) return;
  reset();
  addUserBubble(c);
  busy=true; sendBtn.disabled=true; cmd.value='';
  ws.send(JSON.stringify({command:c}));
});
function finish(){ busy=false; sendBtn.disabled=false; cmd.focus(); }
</script>
</body>
</html>
